<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sourced In The Fray</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@400;500;700&display=swap');

  body {
    margin: 0;
    height: 100vh;
    background: radial-gradient(circle at center, #1a0f1f, #0a050f);
    color: #ffffff;
    font-family: 'Playfair Display', serif;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .game {
    position: relative;
    width: 620px;
    height: 620px;
    text-align: center;
  }

  h1 {
    position: absolute;
    top: -80px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 4.8rem;
    font-weight: 400;
    letter-spacing: 8px;
    color: #ffffff;
    text-shadow: 0 0 30px rgba(255,255,255,0.3);
    white-space: nowrap;
    transition: all 0.4s ease;
    z-index: 20;
  }

  h1:hover {
    font-style: italic;
    letter-spacing: 12px;
    text-shadow: 0 0 40px rgba(180, 100, 255, 0.6);
    transform: translateX(-50%) scale(1.05);
  }

  .werewolf-container {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    z-index: 10;
  }

  .werewolf {
    font-size: 180px;
    transition: all 0.6s cubic-bezier(0.68, -0.55, 0.27, 1.55);
    filter: drop-shadow(0 0 35px #c026d3);
  }

  .shrivel {
    font-size: 90px !important;
    opacity: 0.4;
    filter: drop-shadow(0 0 10px #666);
  }

  .inventory-circle {
    position: absolute;
    inset: 0;
  }

  .slot {
    position: absolute;
    width: 88px;
    height: 88px;
    background: rgba(30, 20, 50, 0.75);
    border: 3px solid rgba(180, 120, 255, 0.4);
    border-radius: 20px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 52px;
    transition: all 0.3s ease;
    box-shadow: 0 8px 25px rgba(0,0,0,0.5);
    backdrop-filter: blur(6px);
  }

  .slot:hover {
    transform: scale(1.25) rotate(8deg);
    border-color: #c084fc;
    background: rgba(60, 30, 90, 0.9);
    box-shadow: 0 0 35px rgba(192, 132, 252, 0.7);
    cursor: pointer;
  }

  /* 8 slots positioned in a perfect circle */
  .slot-1 { transform: rotate(0deg)   translate(245px) rotate(0deg); }
  .slot-2 { transform: rotate(45deg)  translate(245px) rotate(-45deg); }
  .slot-3 { transform: rotate(90deg)  translate(245px) rotate(-90deg); }
  .slot-4 { transform: rotate(135deg) translate(245px) rotate(-135deg); }
  .slot-5 { transform: rotate(180deg) translate(245px) rotate(-180deg); }
  .slot-6 { transform: rotate(225deg) translate(245px) rotate(-225deg); }
  .slot-7 { transform: rotate(270deg) translate(245px) rotate(-270deg); }
  .slot-8 { transform: rotate(315deg) translate(245px) rotate(-315deg); }

  .info {
    position: absolute;
    bottom: -90px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 1.1rem;
    max-width: 520px;
    line-height: 1.5;
    opacity: 0.85;
    font-style: italic;
  }

  .health-bar {
    position: absolute;
    top: 380px;
    left: 50%;
    transform: translateX(-50%);
    width: 220px;
    height: 8px;
    background: #222;
    border-radius: 10px;
    overflow: hidden;
    z-index: 15;
  }

  .health {
    height: 100%;
    width: 100%;
    background: linear-gradient(90deg, #a855f7, #e0a3ff);
    transition: width 0.8s ease;
  }
</style>
</head>
<body>

<div class="game">

  <h1>Sourced In The Fray</h1>

  <div class="inventory-circle">
    <div class="slot slot-1" title="Silver Dagger">🗡️</div>
    <div class="slot slot-2" title="Moon Herb">🌿</div>
    <div class="slot slot-3" title="Blood Vial">🩸</div>
    <div class="slot slot-4" title="Lunar Crystal">🔮</div>
    <div class="slot slot-5" title="Iron Axe">🪓</div>
    <div class="slot slot-6" title="Garlic Root">🧄</div>
    <div class="slot slot-7" title="Skull Token">💀</div>
    <div class="slot slot-8" title="Moon Essence">🌙</div>
  </div>

  <div class="werewolf-container">
    <div class="werewolf" id="werewolf">🐺</div>
  </div>

  <div class="health-bar">
    <div class="health" id="health"></div>
  </div>

  <div class="info">
    Care for your Werewolf.<br>
    Click the surrounding items to feed and protect it.<br>
    If neglected, it will shrivel like a bamboo stalk or a sliver of chalk.
  </div>

</div>

<script>
  let health = 100;
  const werewolf = document.getElementById('werewolf');
  const healthBar = document.getElementById('health');

  function updateWerewolf() {
    if (health <= 30) {
      werewolf.classList.add('shrivel');
      werewolf.style.transform = 'scale(0.75)';
    } else {
      werewolf.classList.remove('shrivel');
      werewolf.style.transform = `scale(${0.8 + health/250})`;
    }
  }

  function feed(amount) {
    health = Math.min(100, health + amount);
    healthBar.style.width = health + '%';
    updateWerewolf();
  }

  // Click on any inventory slot to feed the werewolf
  document.querySelectorAll('.slot').forEach(slot => {
    slot.addEventListener('click', () => {
      // Random amount between 8 and 18
      const amount = Math.floor(Math.random() * 11) + 8;
      
      feed(amount);

      // Visual feedback
      slot.style.transform = 'scale(1.6) rotate(20deg)';
      slot.style.opacity = '0.6';
      
      setTimeout(() => {
        slot.style.transform = '';
        slot.style.opacity = '1';
      }, 300);
    });
  });

  // Slowly lose health over time if not fed
  setInterval(() => {
    if (health > 0) {
      health = Math.max(0, health - 1.5);
      healthBar.style.width = health + '%';
      updateWerewolf();
    }
  }, 800);

  // Initial state
  updateWerewolf();
</script>

</body>
</html>
